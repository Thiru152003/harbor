apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgresql-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: gp2  # Change to gp3 if needed
  awsElasticBlockStore:
    volumeID: "<your-ebs-volume-id>"
    fsType: ext4
